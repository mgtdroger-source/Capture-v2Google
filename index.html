<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Capture v2.0G</title>
<style>
body{font-family:sans-serif;background:#222;color:#eee;margin:10px;padding:0;font-size:14px}
h1,h2,h3{margin:5px 0;font-size:16px;color:#fff}
.panel{background:#333;padding:10px;border-radius:5px;margin-bottom:10px;border:1px solid #444}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.col{display:flex;flex-direction:column}
label{font-size:12px;color:#aaa;margin-bottom:2px}
.val{font-family:monospace;font-size:15px;font-weight:bold;color:#fff;background:#111;padding:5px;border-radius:3px;min-height:18px;word-break:break-all}
.status{font-weight:bold;padding:8px;border-radius:3px;text-align:center;margin-bottom:10px}
.status.good{background:#2e7d32;color:#fff}
.status.wait{background:#ef6c00;color:#fff}
.status.bad{background:#c62828;color:#fff}
button{background:#444;color:#eee;border:1px solid #555;padding:12px;border-radius:5px;font-size:14px;font-weight:bold;cursor:pointer;margin-top:5px;width:100%}
button:active{background:#555}
input[type="text"],textarea{background:#111;color:#fff;border:1px solid #555;padding:6px;border-radius:3px;font-size:14px;font-family:sans-serif;box-sizing:border-box;width:100%}
textarea{height:40px;resize:none}
pre{background:#111;color:#0f0;padding:5px;border-radius:3px;height:100px;overflow-y:scroll;margin:5px 0 0 0;font-family:monospace;font-size:11px;white-space:pre-wrap;border:1px solid #444}
.version{font-size:10px;color:#666;text-align:right;margin-top:5px}
</style>
</head>
<body>
<div class="panel">
<div id="lineStatus" class="status good">System Ready</div>
<div class="grid-2">
<div class="col">
<label>Site Name</label>
<input type="text" id="siteName" placeholder="Optional">
</div>
<div class="col">
<label>Settle Timer</label>
<div id="settleTimer" class="val">--</div>
</div>
</div>
<div class="col" style="margin-top:5px">
<label>Notes</label>
<textarea id="siteNotes" placeholder="Optional"></textarea>
</div>
<button id="captureABtn" onclick="startCaptureA()">Capture A Reference</button>
<button id="exportBtn" onclick="exportData()" style="margin-top:10px">Export Clean Dataset</button>
<button id="resetBtn" onclick="clearAllData()" style="margin-top:10px; border-color: #c62828; color: #ff8a80;">Reset App Data</button>
</div>
<div class="panel">
<h2>Live Stream</h2>
<div class="grid-2">
<div class="col"><label>Live Accuracy</label><div id="liveAcc" class="val">--</div></div>
<div class="col"><label>Live Coordinate</label><div id="liveLatLon" class="val">--</div></div>
</div>
<div class="col" style="margin-top:5px"><label>Live Altitude / altAcc</label><div id="liveAlt" class="val">--</div></div>
</div>
<div class="panel">
<h2>Point A Reference Data</h2>
<div class="grid-2">
<div class="col"><label>A Samples</label><div id="aSamples" class="val">0 / 20</div></div>
<div class="col"><label>A Rejections</label><div id="aRejected" class="val">0</div></div>
</div>
<div class="col" style="margin-top:5px"><label>A Accuracy</label><div id="aAccuracy" class="val">--</div></div>
<div class="col" style="margin-top:5px"><label>A Lat, Lon</label><div id="aLatLon" class="val">--</div></div>
<div class="col" style="margin-top:5px"><label>A Altitude / altAcc</label><div id="aAltitude" class="val">--</div></div>
</div>
<div class="panel">
<h2>Statistical Metrics</h2>
<div class="grid-2">
<div class="col"><label>Mean Accuracy</label><div id="meanAccuracy" class="val">--</div></div>
<div class="col"><label>Min / Max Accuracy</label><div id="minMaxAccuracy" class="val">--</div></div>
<div class="col"><label>Mean Spread</label><div id="meanSpread" class="val">--</div></div>
<div class="col"><label>Max Spread</label><div id="maxSpread" class="val">--</div></div>
</div>
<div class="grid-2" style="margin-top:5px">
<div class="col"><label>First-Last Drift</label><div id="drift" class="val">--</div></div>
<div class="col"><label>Capture Duration</label><div id="duration" class="val">--</div></div>
</div>
<div class="grid-2" style="margin-top:5px">
<div class="col"><label>Mean Altitude</label><div id="meanAltitude" class="val">--</div></div>
<div class="col"><label>Mean Alt Accuracy</label><div id="meanAltAccuracy" class="val">--</div></div>
</div>
</div>
<div class="panel">
<h3>Settle Log (Last 10)</h3>
<pre id="settleLog">No settle logs yet.</pre>
<h3>Accepted A Sample Log</h3>
<pre id="aSampleLog">No accepted samples yet.</pre>
<h3>Rejected Log</h3>
<pre id="rejectedLog">No rejected samples yet.</pre>
</div>
<div class="version">Capture A v2.0G</div>

<script>
const APP_VERSION="2.0G",CAPTURE_SAMPLES=20,CAPTURE_SETTLE_MS=60000,GOOD_ACCURACY_MAX=4.5,
      MAX_SPEED_KMH=0.6,MAX_ALTITUDE_SPREAD_METERS=0.5;
let pointA=null,captureWatchId=null,captureSamples=[],captureRejected=0,rejectedSamples=[],settleSamples=[],captureStartedAt=0,captureSettled=false,lastLiveFix=null;
const $=id=>document.getElementById(id);document.addEventListener("contextmenu",e=>e.preventDefault());
function nowString(ms){if(!ms)return"--:--:--.---";const d=new Date(ms);return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0")+":"+String(d.getSeconds()).padStart(2,"0")+"."+String(d.getMilliseconds()).padStart(3,"0")}
function fmt(v,d=1,suffix=""){return v===null||v===undefined||Number.isNaN(v)?"--":Number(v).toFixed(d)+suffix}
function haversineMeters(a,b){const R=6371000,lat1=a.lat*Math.PI/180,lat2=b.lat*Math.PI/180,dLat=(b.lat-a.lat)*Math.PI/180,dLon=(b.lon-a.lon)*Math.PI/180,x=dLon*Math.cos((lat1+lat2)/2),y=dLat;return Math.sqrt(x*x+y*y)*R}
function beep(){try{const AC=window.AudioContext||window.webkitAudioContext;if(AC){const ac=new AC(),o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.value=1200;g.gain.value=0.05;o.start();o.stop(ac.currentTime+0.2)}}catch(e){}}
function clearCaptureWatch(){if(captureWatchId !== null){navigator.geolocation.clearWatch(captureWatchId);captureWatchId=null}}
function makePoint(pos){const c=pos.coords;return{lat:c.latitude,lon:c.longitude,accuracy:c.accuracy,altitude:c.altitude,altitudeAccuracy:c.altitudeAccuracy,heading:c.heading,speed:c.speed,time:pos.timestamp||Date.now(),receivedAt:Date.now()}}

function averageSamples(samples){
    let weightedLat=0,weightedLon=0,weightSum=0,accSum=0,minAcc=Infinity,maxAcc=-Infinity,altSum=0,altCount=0,altAccSum=0,altAccCount=0;
    let minAlt=Infinity,maxAlt=-Infinity;
    
    samples.forEach(s=>{
        const acc=Math.max(0.1,Number(s.accuracy||20)),w=1/(acc*acc);
        weightedLat+=s.lat*w;
        weightedLon+=s.lon*w;
        weightSum+=w;
        accSum+=acc;
        minAcc=Math.min(minAcc,acc);
        maxAcc=Math.max(maxAcc,acc);
        if(s.altitude!==null&&s.altitude!==undefined){
            altSum+=s.altitude;
            altCount++;
            minAlt=Math.min(minAlt,s.altitude);
            maxAlt=Math.max(maxAlt,s.altitude);
        }
        if(s.altitudeAccuracy!==null&&s.altitudeAccuracy!==undefined){
            altAccSum+=s.altitudeAccuracy;
            altAccCount++
        }
    });
    
    const avg={
        lat:weightedLat/weightSum,
        lon:weightedLon/weightSum,
        accuracy:accSum/samples.length,
        minAccuracy:minAcc,
        maxAccuracy:maxAcc,
        samples:samples.length,
        altitude:altCount?altSum/altCount:null,
        altitudeAccuracy:altAccCount?altAccSum/altAccCount:null,
        verticalSpread:altCount?(maxAlt-minAlt):0
    };
    
    let spreadSum=0,maxSpread=0;
    samples.forEach(s=>{
        s.distanceFromAverage=haversineMeters(s,avg);
        s.distanceFromFirst=haversineMeters(s,samples[0]); // FIXED: Targeted samples[0] to prevent array calculation crashes
        spreadSum+=s.distanceFromAverage;
        maxSpread=Math.max(maxSpread,s.distanceFromAverage)
    });
    
    avg.meanSpread=spreadSum/samples.length;
    avg.maxSpread=maxSpread;
    avg.firstLastDrift=haversineMeters(samples[0],samples[samples.length-1]);
    avg.captureDurationMs=samples[samples.length-1].time-samples[0].time;
    avg.isGeometryStable=avg.verticalSpread<=MAX_ALTITUDE_SPREAD_METERS;
    
    return avg
}

function updateDisplay(){
    $("aSamples").textContent=(pointA?CAPTURE_SAMPLES:captureSamples.length)+" / "+CAPTURE_SAMPLES;
    $("aRejected").textContent=String(captureRejected);
    $("aAccuracy").textContent=pointA?pointA.accuracy.toFixed(1)+" m":"--";
    $("aLatLon").textContent=pointA?pointA.lat.toFixed(6)+", "+pointA.lon.toFixed(6):"--";
    $("aAltitude").textContent=pointA?fmt(pointA.altitude,1," m")+" / altAcc "+fmt(pointA.altitudeAccuracy,1," m"):"--";
    
    $("liveAcc").textContent=lastLiveFix&&lastLiveFix.accuracy?lastLiveFix.accuracy.toFixed(1)+" m":"--";
    $("liveLatLon").textContent=lastLiveFix?lastLiveFix.lat.toFixed(6)+", "+lastLiveFix.lon.toFixed(6):"--";
    $("liveAlt").textContent=lastLiveFix?fmt(lastLiveFix.altitude,1," m")+" / altAcc "+fmt(lastLiveFix.altitudeAccuracy,1," m"):"--";
    
    if(captureWatchId&&!captureSettled){
        const left=Math.max(0,Math.ceil((CAPTURE_SETTLE_MS-(Date.now()-captureStartedAt))/1000));
        $("settleTimer").textContent=left+" sec"
    }else if(captureWatchId&&captureSettled){
        $("settleTimer").textContent="collecting"
    }else{
        $("settleTimer").textContent="--"
    }
    
    if(pointA){
        $("meanAccuracy").textContent=fmt(pointA.accuracy,2," m");
        $("minMaxAccuracy").textContent=fmt(pointA.minAccuracy,2," m")+" / "+fmt(pointA.maxAccuracy,2," m");
        $("meanSpread").textContent=fmt(pointA.meanSpread,2," m");
        $("maxSpread").textContent=fmt(pointA.maxSpread,2," m");
        $("drift").textContent=fmt(pointA.firstLastDrift,2," m");
        $("duration").textContent=fmt(pointA.captureDurationMs/1000,1," sec");
        $("meanAltitude").textContent=fmt(pointA.altitude,2," m")+` (Spread: ${pointA.verticalSpread.toFixed(2)}m)`;
